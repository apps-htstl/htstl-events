document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Karla';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"542d696d-32c4-4fa0-b0e4-0e986ce2574b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Karla';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3e42e465-ca14-4642-99a3-eb98e1557665\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style> body { margin: 0; background: #fbf5e9; font-family: 'Karla', sans-serif; } <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; width:100%; background:#fbf5e9; color:#3a1c14;\">\n  <div style=\"display:flex; align-items:center; justify-content:space-between; padding:20px 40px; background:#7a1220; border-bottom:4px solid #d4a83f;\">\n    <div>\n      <div style=\"font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:700; color:#fbf5e9;\">Event Admin Dashboard<\u002Fdiv>\n      <div style=\"font-size:13px; color:#e8c069;\">Navakundathmaka Shatha Chandi Sahitha Rudra Yagam · July 14–19, 2026<\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"Home.html\" style=\"color:#e8c069; font-size:14px; text-decoration:underline;\">Back to Home<\u002Fa>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1300px; margin:0 auto; padding:28px 24px 80px;\">\n\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px;\">\n      <sc-for list=\"{{ statCards }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff; border:1px solid #e6d4b0; border-radius:14px; padding:18px 20px;\">\n          <div style=\"font-size:12px; color:#8a6a4e; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;\">{{ c.label }}<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:700; color:#7a1220; margin-top:6px;\">{{ c.value }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;\">\n      <sc-for list=\"{{ dayFilters }}\" as=\"d\" hint-placeholder-count=\"7\">\n        <button sc-camel-on-click=\"{{ d.onSelect }}\" style=\"{{ d.chipStyle }}\">{{ d.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;\">\n      <div style=\"background:#fff; border:1px solid #e6d4b0; border-radius:14px; padding:20px;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; color:#7a1220; margin-bottom:12px;\">Registrations by Source<\u002Fdiv>\n        <sc-for list=\"{{ sourceRows }}\" as=\"s\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:10px;\">\n            <div style=\"width:120px; font-size:13px;\">{{ s.label }}<\u002Fdiv>\n            <div style=\"flex:1; background:#f0e4c8; border-radius:6px; height:10px; overflow:hidden;\">\n              <div style=\"{{ s.barStyle }}\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:36px; text-align:right; font-size:13px; font-weight:700;\">{{ s.count }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e6d4b0; border-radius:14px; padding:20px;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; color:#7a1220; margin-bottom:12px;\">Active Sponsorship Levels<\u002Fdiv>\n        <sc-for list=\"{{ bundleSummary }}\" as=\"b\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f0e4c8; font-size:13px;\">\n            <span>{{ b.name }}<\u002Fspan>\n            <span style=\"font-weight:700;\">{{ b.count }} sponsor(s)<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#fff; border:1px solid #e6d4b0; border-radius:14px; padding:20px;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; color:#7a1220;\">All Registrations{{ filterSuffix }}<\u002Fdiv>\n        <div style=\"font-size:13px; color:#8a6a4e;\">{{ tableCount }} record(s)<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1.4fr 1fr 1.6fr 0.8fr 0.9fr 0.8fr; gap:10px; padding:0 10px 10px; font-size:12px; font-weight:700; color:#8a6a4e; text-transform:uppercase; border-bottom:2px solid #e6d4b0;\">\n        <div>Name<\u002Fdiv><div>Gothram<\u002Fdiv><div>Sevas / Bundle<\u002Fdiv><div>Amount<\u002Fdiv><div>Source<\u002Fdiv><div>Read<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ tableRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n        <div style=\"display:grid; grid-template-columns:1.4fr 1fr 1.6fr 0.8fr 0.9fr 0.8fr; gap:10px; padding:12px 10px; font-size:13px; border-bottom:1px solid #f4ead0; align-items:center;\">\n          <div style=\"font-weight:600;\">{{ r.name }}<\u002Fdiv>\n          <div>{{ r.gothram }}<\u002Fdiv>\n          <div style=\"color:#6b4a38;\">{{ r.summary }}<\u002Fdiv>\n          <div style=\"font-weight:700;\">{{ r.amountLabel }}<\u002Fdiv>\n          <div><span style=\"{{ r.sourceBadgeStyle }}\">{{ r.sourceLabel }}<\u002Fspan><\u002Fdiv>\n          <div><span style=\"{{ r.readBadgeStyle }}\">{{ r.readLabel }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { regs: [], dayFilter: 'all' };\n\n  async componentDidMount() {\n    this.T = await import(window.__resources.templeData);\n    this.T.seedDemoData();\n    this._unsub = this.T.subscribe(() => this.load());\n    this._poll = setInterval(() => this.load(), 3000);\n    this.load();\n  }\n  componentWillUnmount() { if (this._unsub) this._unsub(); clearInterval(this._poll); }\n\n  load() { this.setState({ regs: this.T.getRegistrations() }); }\n  setDayFilter = (id) => this.setState({ dayFilter: id });\n\n  renderVals() {\n    const T = this.T; const s = this.state;\n    if (!T) return { statCards: [], dayFilters: [], sourceRows: [], bundleSummary: [], tableRows: [], tableCount: 0, filterSuffix: '' };\n\n    const filtered = s.regs.filter((r) => s.dayFilter === 'all' || r.bundleId || (r.days && r.days.includes(s.dayFilter)));\n\n    const total = filtered.reduce((a, r) => a + (r.amount || 0), 0);\n    const bundleCount = filtered.filter((r) => r.bundleId).length;\n\n    const statCards = [\n      { label: 'Total Registrations', value: String(filtered.length) },\n      { label: 'Total Raised', value: T.fmtMoney(total) },\n      { label: 'Sponsorship Bundles', value: String(bundleCount) },\n      { label: 'Unread Sankalpam Names', value: String(filtered.filter((r) => !r.read).length) },\n    ];\n\n    const dayFilters = [{ id: 'all', label: 'label:all', md: 'All Days' }, ...T.EVENT_DAYS].map((d) => ({\n      ...d,\n      chipStyle: {\n        padding: '8px 14px', borderRadius: '999px', cursor: 'pointer', fontSize: '13px', fontWeight: 600,\n        border: s.dayFilter === d.id ? '2px solid #7a1220' : '1px solid #d8c297',\n        background: s.dayFilter === d.id ? '#7a1220' : 'transparent',\n        color: s.dayFilter === d.id ? '#fff' : '#5a3d2b',\n      },\n      onSelect: () => this.setDayFilter(d.id),\n      label: d.id === 'all' ? 'All Days' : d.label + ' · ' + d.md,\n    }));\n\n    const bySource = { online: 0, walkin: 0, kiosk: 0 };\n    filtered.forEach((r) => { bySource[r.source] = (bySource[r.source] || 0) + 1; });\n    const maxCount = Math.max(1, ...Object.values(bySource));\n    const sourceLabels = { online: 'Online', walkin: 'Staff Walk-in', kiosk: 'Self-Service Kiosk' };\n    const sourceRows = Object.keys(sourceLabels).map((k) => ({\n      label: sourceLabels[k], count: bySource[k] || 0,\n      barStyle: { height: '100%', borderRadius: '6px', background: '#d4a83f', width: (((bySource[k] || 0) / maxCount) * 100) + '%' },\n    }));\n\n    const bundleSummary = T.BUNDLES.map((b) => ({ name: b.name, count: filtered.filter((r) => r.bundleId === b.id).length }));\n\n    const sourceBadge = (src) => ({\n      fontSize: '12px', padding: '3px 10px', borderRadius: '999px',\n      background: src === 'online' ? '#eaf1fb' : src === 'kiosk' ? '#fdf0e2' : '#f0e9fb',\n      color: src === 'online' ? '#2856a3' : src === 'kiosk' ? '#a3652b' : '#6a3fa3',\n    });\n\n    const tableRows = filtered.slice().sort((a, b) => b.ts - a.ts).map((r) => ({\n      ...r,\n      summary: r.bundleId ? (T.BUNDLES.find((b) => b.id === r.bundleId) || {}).name : (r.sevaIds || []).map((id) => T.findSevaName(id)).join(', ') || '—',\n      amountLabel: T.fmtMoney(r.amount || 0),\n      sourceLabel: r.source === 'online' ? 'Online' : r.source === 'kiosk' ? 'Kiosk' : 'Walk-in',\n      sourceBadgeStyle: sourceBadge(r.source),\n      readLabel: r.read ? 'Read' : 'Pending',\n      readBadgeStyle: { fontSize: '12px', padding: '3px 10px', borderRadius: '999px', background: r.read ? '#e9f5ea' : '#fbeee0', color: r.read ? '#2f7d38' : '#b5722a' },\n    }));\n\n    return {\n      statCards, dayFilters, sourceRows, bundleSummary,\n      tableRows, tableCount: tableRows.length,\n      filterSuffix: s.dayFilter === 'all' ? '' : ' — ' + (T.EVENT_DAYS.find((d) => d.id === s.dayFilter) || {}).label,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
